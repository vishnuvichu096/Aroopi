name: Generate YouTube Short

on:
  schedule:
    - cron: '43 10,22 * * *'  # Runs daily at 4:13 AM and 4:13 PM IST (22:43 and 10:43 UTC)
  workflow_dispatch:      # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (ffmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Decode YouTube Upload Token
      env:
        YOUTUBE_TOKEN_PICKLE_BASE64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_BASE64 }}
      run: |
        if [ -n "$YOUTUBE_TOKEN_PICKLE_BASE64" ]; then
          python -c "import base64, os; s = os.environ['YOUTUBE_TOKEN_PICKLE_BASE64'].strip(); s += '=' * (-len(s) % 4); open('token.pickle', 'wb').write(base64.b64decode(s))"
          echo "YouTube token successfully restored."
        else
          echo "Warning: YOUTUBE_TOKEN_PICKLE_BASE64 secret is not set."
        fi

    - name: Run Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        AI_HORDE_API_KEY: ${{ secrets.AI_HORDE_API_KEY }}
        YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS }}
      run: |
        python -u main.py

    - name: Commit State Changes
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add story_state.json assets/
        git commit -m "update story state and generated media" || echo "No changes to commit"
        git push || echo "No changes to push"
