name: Generate YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'  # Runs daily at 9:00 AM UTC (2:30 PM IST)
  workflow_dispatch:      # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (ffmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Decode YouTube Upload Token
      env:
        YOUTUBE_TOKEN_PICKLE_BASE64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_BASE64 }}
      run: |
        if [ -n "$YOUTUBE_TOKEN_PICKLE_BASE64" ]; then
          echo "$YOUTUBE_TOKEN_PICKLE_BASE64" | base64 --decode > token.pickle
          echo "YouTube token successfully restored."
        else
          echo "Warning: YOUTUBE_TOKEN_PICKLE_BASE64 secret is not set."
        fi

    - name: Run Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        FAL_KEY: ${{ secrets.FAL_KEY }}
      run: |
        python main.py

    - name: Commit State Changes
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add story_state.json assets/
        git commit -m "update story state and generated media" || echo "No changes to commit"
        git push || echo "No changes to push"
